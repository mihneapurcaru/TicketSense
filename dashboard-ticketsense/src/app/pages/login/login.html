<div class="bg-background text-on-surface min-h-screen flex flex-col justify-center items-center">
  <div class="mb-10 text-center">
    <div class="inline-flex items-center justify-center w-16 h-16 bg-background rounded-xl neomorph-raised mb-6">
      <span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">confirmation_number</span>
    </div>
    <h1 class="text-3xl font-semibold text-on-surface tracking-tight">TicketSense</h1>
  </div>

  <main class="w-full max-w-md px-6">
    <div class="bg-background rounded-xl p-8 neomorph-raised">
      <h2 class="text-xl font-medium text-on-surface mb-8 text-center">Sign in to your account</h2>

      <form (ngSubmit)="onSubmit()" class="space-y-8">
        @if (error()) {
          <div class="flex items-center gap-3 p-4 rounded-xl bg-error-container text-on-error-container text-sm font-medium">
            <span class="material-symbols-outlined text-lg">error</span>
            {{ error() }}
          </div>
        }

        <div class="space-y-3">
          <label class="text-sm font-medium text-on-surface-variant ml-1" for="username">Username</label>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-on-surface-variant text-lg">person</span>
            </div>
            <input
              id="username"
              name="username"
              type="text"
              [(ngModel)]="username"
              placeholder="name@company.com"
              class="block w-full pl-11 pr-4 py-4 bg-background border-none rounded-xl neomorph-inset focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline transition-all"
            />
          </div>
        </div>

        <!-- Password Field -->
        <div class="space-y-3">
          <div class="flex justify-between items-center px-1">
            <label class="text-sm font-medium text-on-surface-variant" for="password">Password</label>
          </div>
          <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <span class="material-symbols-outlined text-on-surface-variant text-lg">lock</span>
            </div>
            <input
              id="password"
              name="password"
              type="password"
              [(ngModel)]="password"
              placeholder="••••••••"
              class="block w-full pl-11 pr-4 py-4 bg-background border-none rounded-xl neomorph-inset focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline transition-all"
            />
          </div>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="loading()"
          class="w-full py-4 px-6 bg-background rounded-xl neomorph-raised active:scale-95 transition-all group overflow-hidden relative disabled:opacity-60"
        >
          <span class="relative z-10 flex items-center justify-center font-semibold text-primary">
            @if (loading()) {
              Signing in...
            } @else {
              Sign In
              <span class="material-symbols-outlined ml-2 text-xl">arrow_forward</span>
            }
          </span>
        </button>
      </form>
    </div>
  </main>

  <!-- Footer -->
  <footer class="fixed bottom-0 w-full flex flex-col md:flex-row justify-between items-center px-8 py-6 text-slate-400 text-sm">
    <div class="mb-4 md:mb-0">&copy; 2026 TicketSense ITSM. All rights reserved.</div>
  </footer>

  <!-- Decorative Background Elements -->
  <div class="fixed -z-10 top-[10%] left-[5%] w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
  <div class="fixed -z-10 bottom-[10%] right-[5%] w-96 h-96 bg-tertiary/5 rounded-full blur-3xl"></div>
</div>
