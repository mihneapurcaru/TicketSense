<header class="w-full h-16 sticky top-0 z-40 bg-[#e8eaf0] flex justify-between items-center px-8 shadow-[6px_6px_12px_rgba(0,0,0,0.05)]">
  <!-- Search Bar -->
  <div class="flex items-center flex-1 max-w-xl">
    <div class="px-4 py-2 flex items-center gap-2">
    </div>
  </div>

  <!-- Right Section -->
  <div class="flex items-center gap-6">
    <div class="h-8 w-[1px] bg-slate-300"></div>
    <div class="flex items-center gap-3">
      <div class="text-right hidden sm:block">
        <p class="text-sm font-semibold text-on-surface leading-none">{{ user()?.firstName }} {{ user()?.lastName }}</p>
        <p class="text-[10px] text-on-surface-variant font-medium">{{ displayRole() }}</p>
      </div>
      <div class="w-10 h-10 rounded-full neomorph-raised p-0.5 bg-[#e8eaf0]">
        <div class="w-full h-full rounded-full bg-indigo-200 flex items-center justify-center text-indigo-700 text-sm font-bold">
          {{ initials() }}
        </div>
      </div>
    </div>
  </div>
</header>
